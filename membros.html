<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Membros | Vidas Renovadas Gestão</title>

  <link
    rel="stylesheet"
    href="css/estilo.css"
  >

  <style>
    .members-header {
      margin-bottom: 20px;
    }

    .members-toolbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 220px 220px auto;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .members-toolbar input,
    .members-toolbar select {
      width: 100%;
      min-height: 46px;
      box-sizing: border-box;
    }

    .members-toolbar .primary-link {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      white-space: nowrap;
    }

    .toolbar-carteirinhas {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding: 12px 16px;
      border: 1px solid #d8e0e5;
      border-radius: 12px;
      background: #ffffff;
    }

    .selecao-carteirinhas-resumo {
      display: flex;
      align-items: center;
      color: #4a5963;
      font-weight: 800;
    }

    #contadorSelecionados {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: #eef3f6;
      color: #082f49;
    }

    .botao-exportar-selecionadas {
      min-height: 40px;
      padding: 0 18px;
      border: 0;
      border-radius: 9px;
      background: #082f49;
      color: #ffffff;
      cursor: pointer;
      font: inherit;
      font-weight: 800;
      white-space: nowrap;
    }

    .botao-exportar-selecionadas:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .coluna-selecao {
      width: 46px;
      text-align: center;
    }

    .coluna-selecao input,
    .seletor-carteirinha {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #082f49;
    }

    .badge-cargo,
    .badge-congregacao,
    .badge-situacao {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      max-width: 100%;
      padding: 5px 10px;
      border: 1px solid transparent;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.25;
      white-space: nowrap;
    }

    .badge-status-dot {
      width: 9px;
      height: 9px;
      flex: 0 0 9px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.7);
    }

    .badge-cargo-pastoral {
      border-color: #d8c6f0;
      background: #f3ecfb;
      color: #6941a5;
    }

    .badge-cargo-presbitero {
      border-color: #bfd6ed;
      background: #eaf4fc;
      color: #245f91;
    }

    .badge-cargo-diacono {
      border-color: #bfe2d1;
      background: #e9f7f0;
      color: #16704a;
    }

    .badge-cargo-evangelista {
      border-color: #f0d0aa;
      background: #fff3e4;
      color: #9a5a13;
    }

    .badge-cargo-missionario {
      border-color: #e8c7d9;
      background: #fbedf5;
      color: #913c6c;
    }

    .badge-cargo-padrao,
    .badge-congregacao-padrao,
    .badge-situacao-padrao {
      border-color: #d8e0e5;
      background: #f3f6f8;
      color: #53636e;
    }

    .badge-congregacao-independencia {
      border-color: #bfd6ed;
      background: #eaf4fc;
      color: #245f91;
    }

    .badge-congregacao-xerem {
      border-color: #ead79a;
      background: #fff8df;
      color: #866518;
    }

    .badge-situacao-ativo {
      border-color: #b9dfca;
      background: #e7f6ee;
      color: #16794f;
    }

    .badge-situacao-congregado {
      border-color: #ead79a;
      background: #fff8df;
      color: #866518;
    }

    .badge-situacao-visitante {
      border-color: #bfd6ed;
      background: #eaf4fc;
      color: #245f91;
    }

    .badge-situacao-inativo {
      border-color: #efc1bd;
      background: #fcebea;
      color: #b3261e;
    }

    .badge-situacao-transferido {
      border-color: #f0d0aa;
      background: #fff3e4;
      color: #9a5a13;
    }

    .badge-situacao-falecido {
      border-color: #c9cfd4;
      background: #eceff1;
      color: #39444b;
    }

    @media (max-width: 1100px) {
      .members-toolbar {
        grid-template-columns: minmax(260px, 1fr) 190px 190px;
      }

      .members-toolbar .primary-link {
        grid-column: 1 / -1;
        justify-self: end;
      }
    }

    @media (max-width: 760px) {
      .members-toolbar {
        grid-template-columns: 1fr;
      }

      .members-toolbar .primary-link {
        width: 100%;
        grid-column: auto;
        justify-self: stretch;
      }

      .toolbar-carteirinhas {
        align-items: stretch;
        flex-direction: column;
      }

      .selecao-carteirinhas-resumo {
        justify-content: center;
      }

      .botao-exportar-selecionadas {
        width: 100%;
      }

      .badge-cargo,
      .badge-congregacao,
      .badge-situacao {
        white-space: normal;
      }
    }
  </style>
</head>

<body class="dashboard-page">

  <aside class="sidebar">

    <div class="sidebar-brand">
      <img
        src="logo.png"
        alt="Logo da igreja"
        class="sidebar-logo"
      >

      <div>
        <strong>Vidas Renovadas</strong>
        <span>Projeto Neemias</span>
      </div>
    </div>

    <nav class="sidebar-menu">

      <a href="dashboard.html">
        Dashboard
      </a>

      <a href="membros.html" class="active">
        Membros
      </a>

      <a href="#">
        Famílias
      </a>

      <a href="#">
        Carteirinhas
      </a>

      <a href="#">
        Congregações
      </a>

      <a href="#">
        Relatórios
      </a>

      <a href="configuracoes.html">
        Configurações
      </a>

    </nav>

    <a href="index.html" class="logout">
      Sair
    </a>

  </aside>

  <main class="dashboard-main">

    <header class="members-header">

      <div>
        <p class="dashboard-label">
          Cadastro e consulta
        </p>

        <h1>Membros</h1>
      </div>

    </header>

    <section class="members-toolbar" aria-label="Filtros de membros">

      <input
        type="search"
        id="pesquisaMembro"
        placeholder="Pesquisar por nome, ID, cargo ou congregação"
        aria-label="Pesquisar membros"
      >

      <select id="filtroSituacao" aria-label="Filtrar por situação">
        <option value="">
          Todas as situações
        </option>

        <option value="Ativo">Ativo</option>
        <option value="Congregado">Congregado</option>
        <option value="Visitante">Visitante</option>
        <option value="Inativo">Inativo</option>
        <option value="Transferido">Transferido</option>
        <option value="Falecido">Falecido</option>
      </select>

      <select id="filtroCongregacao" aria-label="Filtrar por congregação">
        <option value="">
          Todas as congregações
        </option>

        <option value="Independência / Petrópolis">
          Independência / Petrópolis
        </option>

        <option value="Km 51 / Xerém">
          Km 51 / Xerém
        </option>
      </select>

      <a
        href="novo-membro.html"
        class="primary-link"
      >
        + Novo Membro
      </a>

    </section>

    <section class="toolbar-carteirinhas" aria-label="Exportação de carteirinhas">

      <div class="selecao-carteirinhas-resumo">
        <span id="contadorSelecionados">0 selecionados</span>
      </div>

      <button
        type="button"
        id="botaoExportarSelecionadas"
        class="botao-exportar-selecionadas"
        disabled
      >
        📄 Exportar selecionadas
      </button>

    </section>

    <section class="members-panel">

      <div class="table-wrapper">

        <table class="members-table">

          <thead>
            <tr>
              <th class="coluna-selecao">
                <input
                  type="checkbox"
                  id="selecionarTodosMembros"
                  aria-label="Selecionar todos os membros exibidos"
                  title="Selecionar todos os membros exibidos"
                >
              </th>
              <th>ID</th>
              <th>Nome</th>
              <th>Cargo</th>
              <th>Congregação</th>
              <th>Situação</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="listaMembros">
            <tr>
              <td colspan="7" class="empty-state">
                Carregando membros...
              </td>
            </tr>
          </tbody>

        </table>

      </div>

    </section>

    <footer class="dashboard-footer">
      Vidas Renovadas Gestão — Projeto Neemias
    </footer>

  </main>

  <script src="js/app.js?v=13"></script>

</body>

</html>
