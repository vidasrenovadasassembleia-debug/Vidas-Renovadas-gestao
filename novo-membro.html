<!-- =====================================================
     CAMPO PARA O FORMULÁRIO DE NOVO MEMBRO
     Cole dentro do <form> de cadastro, junto aos demais campos.
===================================================== -->

<div class="campo campo-largura-total">
  <label for="observacaoCarteirinha">
    Informação complementar da carteirinha
  </label>

  <textarea
    id="observacaoCarteirinha"
    name="observacaoCarteirinha"
    rows="4"
    maxlength="500"
    placeholder="Ex.: Pastor Capelão, Capelania Hospitalar, registro nº 5872..."
  ></textarea>

  <small>
    Campo opcional. Será exibido somente quando estiver preenchido.
  </small>
</div>


<!-- =====================================================
     CAMPO PARA O FORMULÁRIO DE EDIÇÃO DE MEMBRO
     Cole dentro do <form> de edição, junto aos demais campos.
     O id pode ser diferente, mas o name precisa permanecer
     exatamente como observacaoCarteirinha.
===================================================== -->

<div class="campo campo-largura-total">
  <label for="editarObservacaoCarteirinha">
    Informação complementar da carteirinha
  </label>

  <textarea
    id="editarObservacaoCarteirinha"
    name="observacaoCarteirinha"
    rows="4"
    maxlength="500"
    placeholder="Ex.: Pastor Capelão, Capelania Hospitalar, registro nº 5872..."
  ></textarea>

  <small>
    Campo opcional. Será exibido somente quando estiver preenchido.
  </small>
</div>
