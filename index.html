<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Vidas Renovadas Gestão</title>

  <link
    rel="stylesheet"
    href="css/estilo.css"
  >

  <script
    src="https://accounts.google.com/gsi/client"
    async
    defer
  ></script>

  <style>
    body.login-page {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(
          circle at top,
          rgba(185, 138, 69, 0.24),
          transparent 34%
        ),
        linear-gradient(
          135deg,
          #0f2f48 0%,
          #174867 52%,
          #0f2f48 100%
        );
      font-family: Arial, Helvetica, sans-serif;
    }

    .login-shell {
      width: min(100%, 460px);
    }

    .login-card {
      padding: 34px 30px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
      text-align: center;
    }

    .login-logo {
      display: block;
      width: 128px;
      height: 128px;
      margin: 0 auto 18px;
      object-fit: contain;
      border-radius: 22px;
      background: #ffffff;
    }

    .login-kicker {
      margin: 0 0 8px;
      color: #b98a45;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .login-card h1 {
      margin: 0;
      color: #0f2f48;
      font-size: clamp(26px, 6vw, 36px);
      line-height: 1.12;
    }

    .login-church {
      margin: 12px 0 24px;
      color: #5c6972;
      font-size: 15px;
      line-height: 1.55;
    }

    .login-project {
      display: inline-block;
      margin-bottom: 22px;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(185, 138, 69, 0.12);
      color: #8a632b;
      font-size: 12px;
      font-weight: 700;
    }

    #googleButton {
      min-height: 44px;
      display: flex;
      justify-content: center;
    }

    .mensagem-login {
      min-height: 22px;
      margin: 14px 0 0;
      color: #a04444;
      font-size: 13px;
      line-height: 1.45;
    }

    .login-verse {
      margin: 24px 0 0;
      padding-top: 20px;
      border-top: 1px solid #e8edf1;
      color: #697680;
      font-size: 13px;
      font-style: italic;
      line-height: 1.55;
    }

    .login-verse strong {
      display: inline-block;
      margin-top: 5px;
      color: #b98a45;
      font-style: normal;
    }

    .login-footer {
      margin: 16px 0 0;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      text-align: center;
    }

    @media (max-width: 520px) {
      body.login-page {
        padding: 14px;
      }

      .login-card {
        padding: 28px 20px;
        border-radius: 20px;
      }

      .login-logo {
        width: 108px;
        height: 108px;
      }
    }
  </style>
</head>

<body class="login-page">

  <div class="login-shell">

    <main class="login-card">

      <img
        src="logo.png"
        class="login-logo"
        alt="Logo da Assembleia de Deus Ministério Vidas Renovadas"
      >

      <p class="login-kicker">
        Assembleia de Deus
      </p>

      <h1>
        Vidas Renovadas Gestão
      </h1>

      <p class="login-church">
        Ministério Vidas Renovadas<br>
        Duque de Caxias — RJ
      </p>

      <span class="login-project">
        Projeto Neemias • Versão 1.0
      </span>

      <div
        id="googleButton"
        aria-label="Entrar com Google"
      ></div>

      <p
        id="mensagemLogin"
        class="mensagem-login"
        aria-live="polite"
      ></p>

      <p class="login-verse">
        “Tudo quanto fizerdes, fazei-o de todo o coração, como ao Senhor.”
        <br>
        <strong>Colossenses 3:23</strong>
      </p>

    </main>

    <p class="login-footer">
      Organizando vidas para servir melhor ao Reino de Deus.
    </p>

  </div>

 <script src="js/app.js?v=12"></script>

</body>

</html>
