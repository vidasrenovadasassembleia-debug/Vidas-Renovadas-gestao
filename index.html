<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Vidas Renovadas Gestão</title>

  <link
    rel="stylesheet"
    href="css/estilo.css"
  >

  <script
    src="https://accounts.google.com/gsi/client"
    async
    defer
  ></script>
</head>

<body>

  <main class="login">

    <img
      src="logo.png"
      class="logo"
      alt="Logo da Assembleia de Deus Ministério Vidas Renovadas"
    >

    <h1>Vidas Renovadas Gestão</h1>

    <p>
      Assembleia de Deus<br>
      Ministério Vidas Renovadas
    </p>

    <div
      id="googleButton"
      aria-label="Entrar com Google"
    ></div>

    <p
      id="mensagemLogin"
      class="mensagem-login"
      aria-live="polite"
    ></p>

    <p class="versiculo">
      “Tudo quanto fizerdes, fazei-o de todo o coração, como ao Senhor.”
      <br>
      <span>Colossenses 3:23</span>
    </p>

  </main>

  <script src="js/app.js?v=9"></script>

</body>

</html>
